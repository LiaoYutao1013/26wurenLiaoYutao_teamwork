localization_fusion:
  ros__parameters:
    # 初始位姿：(0, -15, 朝北)
    initial_x: 0.0
    initial_y: -15.0
    initial_yaw: 1.57079632679
    # 定位融合参数
    gps_gain: 0.12
    mag_gain: 0.05
    # 广州的磁偏角
    magnetic_declination: -0.044
    # 使用第一帧GPS数据作为地图原点
    use_first_gps_as_origin: true
    # 跳变拒绝阈值
    gps_reject_distance: 8.0
    mag_reject_angle: 1.2
    # 传感器话题：与model.sdf中的传感器话题一致
    gps_topic: /sensors/gps/fix
    imu_topic: /sensors/imu/data_raw
    wheel_odom_topic: /sensors/wheel_odom
    magnetic_field_topic: /sensors/magnetic_field

cone_mapper:
  ros__parameters:
    # 地图话题：与track_perception的节点约定一致
    perception_map_topic: /perception/cones
    # 合并距离阈值
    merge_distance: 0.75
    # 可视化锥桶参数
    marker_scale_x: 0.35
    marker_scale_y: 0.35
    marker_scale_z: 0.56

right_angle_planner:
  ros__parameters:
    pair_distance_max: 6.0

pure_pursuit_controller:
  ros__parameters:
    wheelbase: 1.04
    target_speed: 3.0
    lookahead_distance: 3.0
    max_steer_angle: 0.8

track_perception:
  ros__parameters:
    max_range: 18.0
    lateral_range: 9.0
    position_noise_std: 0.05